apiVersion: v1
kind: Service
metadata:
  name: cloudcreators-service
  namespace: cloudcreators
spec:
  type: LoadBalancer
  selector:
    app: cloudcreators-app
  ports:
    - name: frontend
      protocol: TCP
      port: 3000
      targetPort: 3000

    - name: backend
      protocol: TCP
      port: 8000
      targetPort: 8000
